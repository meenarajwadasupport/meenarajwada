<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#7D1935"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>

  <!-- Crown shape (white) -->
  <g transform="translate(32,28)">
    <!-- Crown base -->
    <rect x="-13" y="4" width="26" height="6" rx="1.5" fill="white"/>
    <!-- Left prong -->
    <polygon points="-13,4 -13,-4 -6,0 -4,4" fill="white"/>
    <!-- Centre prong (tallest) -->
    <polygon points="-3,4 0,-10 3,4" fill="white"/>
    <!-- Right prong -->
    <polygon points="4,4 6,0 13,-4 13,4" fill="white"/>
    <!-- Gem dots on tips -->
    <circle cx="-13" cy="-5" r="2" fill="white"/>
    <circle cx="0"   cy="-12" r="2.5" fill="white"/>
    <circle cx="13"  cy="-5" r="2" fill="white"/>
  </g>

  <!-- MR monogram below crown -->
  <text x="32" y="50"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="600"
    fill="white"
    text-anchor="middle"
    letter-spacing="2">MR</text>
</svg>
