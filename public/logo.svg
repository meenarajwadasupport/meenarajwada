<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 30 400 320">
  <!-- Ornamental circle — center at (280,200) -->
  <g transform="translate(280,200)">

    <!-- Outer thin ring -->
    <circle r="134" fill="none" stroke="#7D1935" stroke-width="1.3"/>

    <!-- Beaded ring (circumference≈842, ~46 beads) -->
    <circle r="127" fill="none" stroke="#7D1935" stroke-width="5.5"
            stroke-dasharray="5 13.3" stroke-linecap="round"
            transform="rotate(-1.4)"/>

    <!-- Inner thin ring -->
    <circle r="120" fill="none" stroke="#7D1935" stroke-width="1.3"/>

    <!-- ── CROWN ── -->
    <g transform="translate(0,-143)">
      <!-- Base plateau -->
      <rect x="-24" y="19" width="48" height="10" rx="2" fill="#7D1935"/>
      <!-- Left prong -->
      <path d="M -24,19 L -24,2 L -12,11 L -8,19 Z" fill="#7D1935"/>
      <!-- Centre prong (tallest) -->
      <path d="M -6,19 L 0,-10 L 6,19 Z" fill="#7D1935"/>
      <!-- Right prong -->
      <path d="M 8,19 L 12,11 L 24,2 L 24,19 Z" fill="#7D1935"/>
      <!-- Gem balls on prong tips -->
      <circle cx="-24" cy="-1"  r="3.5" fill="#7D1935"/>
      <circle cx="0"   cy="-13" r="4"   fill="#7D1935"/>
      <circle cx="24"  cy="-1"  r="3.5" fill="#7D1935"/>
      <!-- Inner half-prong gems -->
      <circle cx="-12" cy="8" r="2.6" fill="#7D1935"/>
      <circle cx=" 12" cy="8" r="2.6" fill="#7D1935"/>
      <!-- Base dots -->
      <circle cx="-15" cy="24" r="2" fill="#7D1935"/>
      <circle cx="  0" cy="24" r="2" fill="#7D1935"/>
      <circle cx=" 15" cy="24" r="2" fill="#7D1935"/>
    </g>

    <!-- ── DIAMOND bottom ── -->
    <path d="M 0,128 L -7,117 L 0,107 L 7,117 Z" fill="#7D1935"/>

    <!-- ── LEFT cardinal ornament ── -->
    <g transform="translate(-127,0)">
      <circle r="5" fill="#7D1935"/>
      <path d="M -5,-3 C -13,-3 -15,3 -5,3" stroke="#7D1935" stroke-width="1.2" fill="none"/>
      <path d="M -5, 3 C -13, 3 -15,-3 -5,-3" stroke="#7D1935" stroke-width="1.2" fill="none"/>
      <path d="M  5,-3 C  13,-3  15,3  5,3" stroke="#7D1935" stroke-width="1.2" fill="none"/>
      <path d="M  5, 3 C  13, 3  15,-3  5,-3" stroke="#7D1935" stroke-width="1.2" fill="none"/>
    </g>

    <!-- ── RIGHT cardinal ornament ── -->
    <g transform="translate(127,0)">
      <circle r="5" fill="#7D1935"/>
      <path d="M -5,-3 C -13,-3 -15,3 -5,3" stroke="#7D1935" stroke-width="1.2" fill="none"/>
      <path d="M -5, 3 C -13, 3 -15,-3 -5,-3" stroke="#7D1935" stroke-width="1.2" fill="none"/>
      <path d="M  5,-3 C  13,-3  15,3  5,3" stroke="#7D1935" stroke-width="1.2" fill="none"/>
      <path d="M  5, 3 C  13, 3  15,-3  5,-3" stroke="#7D1935" stroke-width="1.2" fill="none"/>
    </g>

    <!-- ── MR MONOGRAM — smaller so R never clips ── -->
    <text
      x="0" y="62"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="96"
      font-weight="bold"
      fill="#7D1935"
      text-anchor="middle"
      letter-spacing="6">MR</text>

  </g>
</svg>
