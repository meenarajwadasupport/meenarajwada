<svg xmlns="http://www.w3.org/2000/svg" viewBox="130 35 300 308">
  <!-- Ornamental circle — center at (280,205) -->
  <g transform="translate(280,205)">

    <!-- Outer thin ring -->
    <circle r="134" fill="none" stroke="#7D1935" stroke-width="1.2"/>
    <!-- Beaded ring -->
    <circle r="127" fill="none" stroke="#7D1935" stroke-width="5.5"
            stroke-dasharray="5 13.3" stroke-linecap="round"
            transform="rotate(-1.4)"/>
    <!-- Inner thin ring -->
    <circle r="120" fill="none" stroke="#7D1935" stroke-width="1.2"/>

    <!-- CROWN (top of circle) -->
    <g transform="translate(0,-148)">
      <rect x="-22" y="18" width="44" height="9" rx="2" fill="#7D1935"/>
      <path d="M -22,18 L -22,1 L -11,10 L -7,18 Z" fill="#7D1935"/>
      <path d="M -5,18 L 0,-9 L 5,18 Z" fill="#7D1935"/>
      <path d="M 7,18 L 11,10 L 22,1 L 22,18 Z" fill="#7D1935"/>
      <circle cx="-22" cy="-2"  r="3.2" fill="#7D1935"/>
      <circle cx="0"   cy="-13" r="3.8" fill="#7D1935"/>
      <circle cx="22"  cy="-2"  r="3.2" fill="#7D1935"/>
      <circle cx="-11" cy="7"   r="2.4" fill="#7D1935"/>
      <circle cx=" 11" cy="7"   r="2.4" fill="#7D1935"/>
      <circle cx="-14" cy="22.5" r="1.9" fill="#7D1935"/>
      <circle cx="  0" cy="22.5" r="1.9" fill="#7D1935"/>
      <circle cx=" 14" cy="22.5" r="1.9" fill="#7D1935"/>
    </g>

    <!-- Diamond bottom -->
    <path d="M 0,131 L -7,120 L 0,109 L 7,120 Z" fill="#7D1935"/>

    <!-- Left cardinal ornament -->
    <g transform="translate(-127,0)">
      <circle r="4.5" fill="#7D1935"/>
      <path d="M -5,-3 C -13,-3 -15,3 -5,3" stroke="#7D1935" stroke-width="1.1" fill="none"/>
      <path d="M -5, 3 C -13, 3 -15,-3 -5,-3" stroke="#7D1935" stroke-width="1.1" fill="none"/>
      <path d="M  5,-3 C  13,-3  15,3  5,3" stroke="#7D1935" stroke-width="1.1" fill="none"/>
      <path d="M  5, 3 C  13, 3  15,-3  5,-3" stroke="#7D1935" stroke-width="1.1" fill="none"/>
    </g>

    <!-- Right cardinal ornament -->
    <g transform="translate(127,0)">
      <circle r="4.5" fill="#7D1935"/>
      <path d="M -5,-3 C -13,-3 -15,3 -5,3" stroke="#7D1935" stroke-width="1.1" fill="none"/>
      <path d="M -5, 3 C -13, 3 -15,-3 -5,-3" stroke="#7D1935" stroke-width="1.1" fill="none"/>
      <path d="M  5,-3 C  13,-3  15,3  5,3" stroke="#7D1935" stroke-width="1.1" fill="none"/>
      <path d="M  5, 3 C  13, 3  15,-3  5,-3" stroke="#7D1935" stroke-width="1.1" fill="none"/>
    </g>

    <!-- MR Monogram -->
    <text x="2" y="66"
      font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
      font-size="118" font-weight="700"
      fill="#7D1935" text-anchor="middle" letter-spacing="-2">MR</text>

  </g>
</svg>
